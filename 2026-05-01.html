<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Paper — 2026-05-01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ──────────────────────────────────────────── */
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fbfbf9;
  --surface-offset:#f3f0ec;--divider:#dcd9d5;--border:#d4d1ca;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hl:#cedcd8;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --r-sm:0.375rem;--r-md:0.5rem;--r-lg:0.75rem;--r-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Work Sans','Helvetica Neue',sans-serif;
  --color-highlight:#c0392b;--color-highlight-bg:#fdf3f2;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;
  --surface-offset:#1d1c1a;--divider:#262523;--border:#393836;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#313b3b;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --color-highlight:#e74c3c;--color-highlight-bg:#2a1a1a;
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;
  --surface-offset:#1d1c1a;--divider:#262523;--border:#393836;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hl:#313b3b;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);
  --shadow-md:0 4px 12px oklch(0 0 0/0.3);
  --color-highlight:#e74c3c;--color-highlight-bg:#2a1a1a;
}}
/* ── Base ───────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);
  color:var(--text);background:var(--bg);line-height:1.6}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:var(--primary)}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:var(--r-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* ── Layout ─────────────────────────────────────────────────── */
.container{max-width:960px;margin-inline:auto;padding-inline:clamp(1rem,4vw,2rem)}
/* ── Header ─────────────────────────────────────────────────── */
.site-header{
  position:sticky;top:0;z-index:50;
  background:color-mix(in oklab,var(--bg) 90%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--divider);
}
.header-inner{
  max-width:960px;margin-inline:auto;
  padding:var(--space,.75rem) clamp(1rem,4vw,2rem);
  display:flex;align-items:center;gap:1rem;
}
.site-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--text)}
.site-logo svg{color:var(--primary)}
.logo-text{font-family:var(--font-display);font-size:1.2rem;font-style:italic}
.header-nav{display:flex;align-items:center;gap:.25rem;margin-left:auto}
.nav-link{font-size:var(--text-sm);color:var(--muted);text-decoration:none;
  padding:.35rem .7rem;border-radius:var(--r-md);
  transition:color var(--transition),background var(--transition)}
.nav-link:hover{color:var(--text);background:var(--surface-offset)}
.theme-btn{
  width:36px;height:36px;border-radius:var(--r-md);
  border:1px solid var(--border);
  transition:border-color var(--transition),background var(--transition);
  display:grid;place-items:center;
}
.theme-btn:hover{border-color:var(--primary);background:var(--primary-hl)}
/* ── Hero ───────────────────────────────────────────────────── */
.hero{padding:clamp(2rem,6vw,4rem) 0 clamp(1rem,3vw,2rem)}
.hero-label{font-size:var(--text-xs);color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.5rem}
.hero-title{font-family:var(--font-display);font-size:var(--text-xl);
  font-style:italic;line-height:1.15;margin-bottom:.75rem}
.hero-date{font-size:var(--text-sm);color:var(--muted)}
.hero-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
/* ── Badge ───────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .7rem;border-radius:var(--r-full);
  font-size:var(--text-xs);font-weight:600;
  background:color-mix(in oklab,var(--primary) 12%,var(--surface));color:var(--primary)}
/* ── Filter bar ─────────────────────────────────────────────── */
.filter-bar{
  display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;
  padding-block:1rem;border-bottom:1px solid var(--divider);
  margin-bottom:1.5rem;
}
.filter-label{font-size:var(--text-xs);color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.06em}
.filter-btn{
  font-size:var(--text-xs);padding:.3rem .7rem;border-radius:var(--r-full);
  border:1px solid var(--border);color:var(--muted);
  transition:border-color var(--transition),color var(--transition),background var(--transition);
}
.filter-btn:hover,.filter-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-hl)}
.search-input{
  margin-left:auto;padding:.35rem .9rem;
  border-radius:var(--r-full);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:var(--text-sm);
  min-width:180px;max-width:260px;
  transition:border-color var(--transition);
}
.search-input:focus{border-color:var(--primary);outline:none}
/* ── Paper card ─────────────────────────────────────────────── */
.paper-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:clamp(1rem,3vw,1.5rem);
  box-shadow:var(--shadow-sm);
  transition:box-shadow var(--transition),border-color var(--transition);
  margin-bottom:1rem;
}
.paper-card:hover{box-shadow:var(--shadow-md);border-color:color-mix(in oklab,var(--primary) 30%,var(--border))}
/* Tier 0 — priority highlight: red frame */
.paper-card[data-tier="0"]{
  border:2px solid var(--color-highlight);
  box-shadow:0 0 0 3px color-mix(in oklab,var(--color-highlight) 12%,transparent);
  background:var(--color-highlight-bg);
}
.paper-card[data-tier="0"]:hover{
  box-shadow:0 0 0 3px color-mix(in oklab,var(--color-highlight) 20%,transparent),var(--shadow-md);
}
/* Tier badge */
.tier-badge{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.2rem .55rem;border-radius:var(--r-full);
  font-size:var(--text-xs);font-weight:700;letter-spacing:.04em;
  border:1px solid currentColor;margin-bottom:.4rem;
}
.tier-badge[data-tier="0"]{color:var(--color-highlight);background:color-mix(in oklab,var(--color-highlight) 10%,transparent)}
.tier-badge[data-tier="1"]{color:var(--primary);background:color-mix(in oklab,var(--primary) 10%,transparent)}
.tier-badge[data-tier="2"]{color:#7d6608;background:color-mix(in oklab,#d4ac0d 12%,transparent)}
[data-theme="dark"] .tier-badge[data-tier="2"]{color:#e8c84a}
.tier-badge[data-tier="3"]{color:var(--muted);background:color-mix(in oklab,var(--muted) 8%,transparent)}
.tier-badge[data-tier="4"]{color:var(--faint);background:color-mix(in oklab,var(--faint) 8%,transparent)}
/* Topic tags */
.topic-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.5rem}
.topic-tag{padding:.15rem .5rem;border-radius:var(--r-full);font-size:var(--text-xs);
  background:color-mix(in oklab,var(--primary) 8%,var(--surface));color:var(--primary)}
/* Tier section headers */
.tier-group{margin-bottom:var(--space-6,1.5rem)}
.tier-section-header{
  display:flex;align-items:center;gap:.5rem;
  padding:.4rem 0;
  font-size:var(--text-xs);font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.07em;
  border-bottom:1px solid var(--divider);margin-bottom:.75rem;
}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tier-section-header[data-tier="0"] .section-dot{background:var(--color-highlight)}
.tier-section-header[data-tier="1"] .section-dot{background:var(--primary)}
.tier-section-header[data-tier="2"] .section-dot{background:#d4ac0d}
.tier-section-header[data-tier="3"] .section-dot{background:var(--muted)}
.tier-section-header[data-tier="4"] .section-dot{background:var(--faint)}
/* ── Card internals ─────────────────────────────────────────── */
.paper-number{font-size:var(--text-xs);color:var(--faint);font-weight:600;
  margin-bottom:.4rem;font-variant-numeric:tabular-nums}
.paper-title{font-family:var(--font-display);font-size:var(--text-lg);line-height:1.25;margin-bottom:.5rem}
.paper-title a{text-decoration:none;color:var(--text)}
.paper-title a:hover{color:var(--primary)}
.paper-meta{display:flex;flex-wrap:wrap;align-items:center;gap:.3rem;
  font-size:var(--text-xs);color:var(--muted);margin-bottom:.5rem}
.paper-venue{font-weight:600;color:var(--muted)}
.paper-dot{color:var(--faint)}
.tldr-chip{display:flex;gap:.5rem;background:var(--surface-offset);
  border-radius:var(--r-md);padding:.5rem .75rem;font-size:var(--text-sm)}
.tldr-chip strong{color:var(--primary);flex-shrink:0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(220px,100%),1fr));gap:.75rem}
.summary-block{background:var(--surface-2);border:1px solid var(--divider);
  border-radius:var(--r-md);padding:.6rem .75rem}
.summary-block-label{font-size:var(--text-xs);font-weight:700;color:var(--primary);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem}
.summary-block-text{font-size:var(--text-sm);color:var(--text)}
.abstract-toggle{
  display:inline-flex;align-items:center;gap:.3rem;margin-top:.25rem;
  font-size:var(--text-xs);color:var(--muted);padding:.2rem .5rem;
  border-radius:var(--r-md);border:1px solid var(--border);
  transition:color var(--transition),border-color var(--transition);
}
.abstract-toggle:hover{color:var(--primary);border-color:var(--primary)}
.abstract-toggle svg{transition:transform var(--transition)}
.abstract-toggle.open svg{transform:rotate(180deg)}
.abstract-body{display:none;font-size:var(--text-sm);color:var(--muted);
  line-height:1.7;padding:.75rem 0 .25rem;max-width:72ch}
.abstract-body.visible{display:block}
/* ── Feedback ───────────────────────────────────────────────── */
.feedback-row{display:flex;align-items:center;gap:.5rem;margin-top:.5rem;
  padding-top:.5rem;border-top:1px solid var(--divider)}
.feedback-label{font-size:var(--text-xs);color:var(--faint)}
.feedback-btn{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.25rem .5rem;border-radius:var(--r-full);
  font-size:var(--text-xs);border:1px solid var(--border);
  color:var(--muted);
  transition:color var(--transition),border-color var(--transition),background var(--transition);
}
.feedback-btn:hover{color:var(--primary);border-color:var(--primary)}
.feedback-btn.voted-up{color:#437a22;border-color:#437a22;background:color-mix(in oklab,#437a22 10%,transparent)}
.feedback-btn.voted-down{color:var(--color-highlight);border-color:var(--color-highlight);
  background:color-mix(in oklab,var(--color-highlight) 10%,transparent)}
/* ── Empty state ────────────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:1rem;color:var(--faint)}
.empty-state h3{color:var(--text);margin-bottom:.5rem;font-family:var(--font-display);font-style:italic}
.empty-state p{max-width:36ch;font-size:var(--text-sm)}
/* ── Papers list wrapper ────────────────────────────────────── */
.papers-list{padding-bottom:3rem}
/* ── Footer ─────────────────────────────────────────────────── */
.site-footer{
  border-top:1px solid var(--divider);
  padding:1.5rem clamp(1rem,4vw,2rem);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;
  font-size:var(--text-xs);color:var(--muted);max-width:960px;margin-inline:auto;
}
.footer-links{display:flex;gap:1rem}
.footer-links a{color:var(--muted);text-decoration:none}
.footer-links a:hover{color:var(--primary)}
</style>
</head>
<body>

<script>
// --- Theme toggle ---
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  function setTheme(theme){
    d=theme;r.setAttribute('data-theme',d);
    if(t){
      t.innerHTML=d==='dark'
        ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');
    }
  }
  setTheme(d);
  t&&t.addEventListener('click',()=>setTheme(d==='dark'?'light':'dark'));
})();

// --- Abstract toggles ---
document.querySelectorAll('.abstract-toggle').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const id=btn.getAttribute('aria-controls');
    const body=document.getElementById(id);
    const open=btn.getAttribute('aria-expanded')==='true';
    btn.setAttribute('aria-expanded',String(!open));
    btn.classList.toggle('open',!open);
    body.classList.toggle('visible',!open);
  });
});

// --- Filter, Sort & Search ---
(function(){
  const list=document.getElementById('papers-list');
  if(!list)return;
  const cards=()=>Array.from(list.querySelectorAll('.paper-card'));
  let currentSort='tier';
  let currentFilter='all';

  function renumber(){
    let n=1;
    cards().forEach(c=>{
      if(c.style.display!=='none'){
        const el=c.querySelector('.paper-number');
        if(el)el.textContent=String(n++);
      }
    });
  }

  function applyVisibility(){
    const q=(document.getElementById('search-input')?.value||'').toLowerCase().trim();
    cards().forEach(c=>{
      const tierMatch=(currentFilter==='all')||(c.dataset.tier===currentFilter);
      const haystack=(c.dataset.title||'')+' '+(c.dataset.authors||'')+' '+(c.dataset.venue||'');
      const textMatch=!q||haystack.includes(q);
      c.style.display=(tierMatch&&textMatch)?'':'none';
    });
    list.querySelectorAll('.tier-group').forEach(grp=>{
      const hasVisible=Array.from(grp.querySelectorAll('.paper-card')).some(c=>c.style.display!=='none');
      grp.style.display=hasVisible?'':'none';
    });
    renumber();
  }

  function applySort(key){
    currentSort=key;
    if(key==='tier'){
      list.querySelectorAll('.tier-group').forEach(grp=>{
        const grpCards=Array.from(grp.querySelectorAll('.paper-card'));
        grpCards.sort((a,b)=>((b.dataset.date||'').localeCompare(a.dataset.date||'')));
        grpCards.forEach(c=>grp.appendChild(c));
        grp.style.display='';
      });
      const groups=Array.from(list.querySelectorAll('.tier-group'));
      groups.sort((a,b)=>{
        const ta=parseInt(a.querySelector('.tier-section-header')?.dataset.tier||'9');
        const tb=parseInt(b.querySelector('.tier-section-header')?.dataset.tier||'9');
        return ta-tb;
      });
      groups.forEach(g=>list.appendChild(g));
    } else {
      list.querySelectorAll('.tier-group').forEach(g=>g.style.display='');
      const allCards=cards();
      allCards.sort((a,b)=>{
        if(key==='date') return(b.dataset.date||'').localeCompare(a.dataset.date||'');
        if(key==='venue') return(a.dataset.venue||'').localeCompare(b.dataset.venue||'');
        return 0;
      });
      allCards.forEach(c=>list.appendChild(c));
    }
    applyVisibility();
  }

  document.querySelectorAll('.filter-btn[data-filter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn[data-filter]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter=btn.dataset.filter;
      if(currentFilter!=='all'&&currentSort!=='tier'){
        document.querySelectorAll('.filter-btn[data-sort]').forEach(b=>b.classList.remove('active'));
        document.querySelector('.filter-btn[data-sort="tier"]')?.classList.add('active');
        applySort('tier');
      }else{applyVisibility();}
    });
  });

  document.querySelectorAll('.filter-btn[data-sort]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn[data-sort]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if(btn.dataset.sort!=='tier'){list.querySelectorAll('.tier-group').forEach(g=>g.style.display='');}
      applySort(btn.dataset.sort);
    });
  });

  const searchInput=document.getElementById('search-input');
  if(searchInput){searchInput.addEventListener('input',applyVisibility);}

  applySort('tier');
})();

// --- Feedback ---
(function(){
  const PAGE_DATE=document.querySelector('.hero-date')?.textContent?.trim()||'';
  const votes={};
  function saveVote(pid,ptitle,vote){
    votes[pid]={paperId:pid,title:ptitle,vote:vote,date:PAGE_DATE};
    renderHint();
  }
  function renderHint(){
    const count=Object.keys(votes).length;
    let hint=document.getElementById('feedback-hint');
    if(!hint){
      hint=document.createElement('div');hint.id='feedback-hint';
      hint.style.cssText='position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;'+
        'background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);'+
        'padding:.75rem 1rem;font-size:var(--text-xs);color:var(--muted);'+
        'box-shadow:var(--shadow-md);max-width:280px;display:flex;flex-direction:column;gap:.5rem;';
      document.body.appendChild(hint);
    }
    hint.innerHTML='<span style="color:var(--text);font-weight:600">'+count+' vote'+(count!==1?'s':'')+' recorded</span>'+
      '<span>Commit JSON to <code>feedback/'+PAGE_DATE+'.json</code>:</span>'+
      '<button id="copy-fb-btn" style="align-self:flex-start;padding:.25rem .6rem;border-radius:var(--r-full);'+
      'border:1px solid var(--border);background:transparent;color:var(--primary);cursor:pointer;font-size:var(--text-xs)">'+
      'Copy feedback JSON</button>';
    document.getElementById('copy-fb-btn').onclick=function(){
      const payload=JSON.stringify({date:PAGE_DATE,feedback:Object.values(votes)},null,2);
      navigator.clipboard.writeText(payload).then(()=>{
        this.textContent='✓ Copied!';setTimeout(()=>{this.textContent='Copy feedback JSON';},2000);
      }).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=payload;ta.style.cssText='width:100%;height:80px;font-size:10px;margin-top:.5rem';
        hint.appendChild(ta);ta.select();
      });
    };
  }
  document.querySelectorAll('.feedback-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const vote=this.dataset.vote,pid=this.dataset.pid,ptitle=this.dataset.ptitle;
      const row=this.closest('.feedback-row');
      if(this.classList.contains('voted-up')||this.classList.contains('voted-down')){
        row.querySelectorAll('.feedback-btn').forEach(b=>b.classList.remove('voted-up','voted-down'));
        delete votes[pid];
        if(!Object.keys(votes).length){const h=document.getElementById('feedback-hint');if(h)h.remove();}
        return;
      }
      row.querySelectorAll('.feedback-btn').forEach(b=>b.classList.remove('voted-up','voted-down'));
      this.classList.add(vote==='up'?'voted-up':'voted-down');
      saveVote(pid,ptitle,vote);
    });
  });
})();
</script>
</body>
</html>
