mode: query
user_interest: 'Textual analysis with a preference for NLP methods and a strong preference
  for LLM-based approaches applied to management science topics. Core areas of interest
  include: responsibility shifting in organisations, anti-fragility studies, ESG (Environmental
  Social Governance) research, and AI adoption in firms and industries. Papers should
  be empirical or methodological contributions, not purely theoretical or benchmark-only.
  Preference for cross-disciplinary work bridging NLP/LLM techniques with management,
  strategy, or organisational studies.

  '
keywords:
- textual analysis preference
- analysis preference nlp
- preference nlp methods
- nlp methods strong
- methods strong preference
- strong preference llm
sources:
- semanticscholar
max_papers: 10
system_prompt: "You are a rigorous academic expert. Given a paper title, TLDR, and\
  \ abstract, produce a concise structured summary in English. Output ONLY a JSON\
  \ object with these exact keys:\n  problem   – one sentence: the pain point or research\
  \ gap addressed\n  method    – the core architecture, algorithm, model, or mechanism\
  \ used\n  innovation – the key improvement or contribution (metrics, limits resolved)\n\
  No extra keys, no markdown fences, no preamble."
user_prompt: 'Title: {title}

  TLDR: {tldr}

  Abstract: {abstract}'
