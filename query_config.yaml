mode: query
user_interest: 'Textual analysis with a preference for NLP methods and a strong preference
  for LLM-based approaches applied to management science topics. Core areas of interest
  include: responsibility shifting in organisations, anti-fragility studies, ESG (Environmental
  Social Governance) research, and AI adoption in firms and industries. Papers should
  be empirical or methodological contributions, not purely theoretical or benchmark-only.
  Preference for cross-disciplinary work bridging NLP/LLM techniques with management,
  strategy, or organisational studies.

  '
keywords:
- LLM textual analysis management
- NLP ESG firm performance
- AI adoption organizational studies
- responsibility shifting NLP
- anti-fragility LLM research
- empirical NLP management science
- cross-disciplinary LLM strategy
sources:
- semanticscholar
max_papers: 10
system_prompt: "You are an expert in management science, organisational studies, and\
  \ computational text analysis. You evaluate academic papers for their relevance\
  \ to the following research agenda:\n  1. NLP and LLM methods applied to management\
  \ science problems\n  2. ESG (Environmental, Social, Governance) disclosure and\
  \ analysis\n  3. Responsibility shifting and accountability in organisations\n \
  \ 4. Anti-fragility and resilience in firms and industries\n  5. AI adoption and\
  \ governance in organisations\nYou must output ONLY a valid JSON object — no markdown\
  \ fences, no preamble, no extra keys. If the paper is not relevant to the agenda\
  \ above, set all three values to \"Not relevant to research agenda\".\n"
user_prompt: "Evaluate the following paper for our research agenda (NLP/LLM applied\
  \ to management science, ESG, responsibility shifting, anti-fragility, AI adoption\
  \ in organisations).\nTitle: {title} TLDR: {tldr} Abstract: {abstract}\nRespond\
  \ with a JSON object with exactly these keys:\n  \"problem\":    one sentence —\
  \ the management/organisational problem addressed\n  \"method\":     one sentence\
  \ — the NLP/LLM/textual method used\n  \"innovation\": one sentence — the key empirical\
  \ or methodological contribution\n\nIf this paper is not relevant to the research\
  \ agenda, return:\n  {{\"problem\": \"Not relevant to research agenda\", \"method\"\
  : \"N/A\", \"innovation\": \"N/A\"}}\n"
